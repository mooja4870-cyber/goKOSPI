<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goKOSPI 리밸런싱 대시보드</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0d12;
            --card-bg: rgba(30, 32, 44, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f6fa;
            --text-secondary: #8a8f9f;
            --accent-blue: #007aff;
            --accent-red: #ff3b30;
            --accent-green: #34c759;
            --red-glow: 0 0 15px rgba(255, 59, 48, 0.4);
            --green-glow: 0 0 15px rgba(52, 199, 89, 0.4);
            --blue-glow: 0 0 15px rgba(0, 122, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 122, 255, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(255, 59, 48, 0.03) 0%, transparent 40%);
        }

        /* 헤더 스타일 */
        header {
            max-width: 1400px;
            margin: 0 auto 2.5rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f5f6fa 30%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            background-color: rgba(0, 122, 255, 0.1);
            color: var(--accent-blue);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(0, 122, 255, 0.2);
            box-shadow: var(--blue-glow);
        }

        /* 메인 컨테이너 레이아웃 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* 공통 카드 스타일 (글래스모피즘) */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        /* 통계 위젯 Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }

        .stat-box.green .stat-value { color: var(--accent-green); }
        .stat-box.red .stat-value { color: var(--accent-red); }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
        }

        th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 0.9rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        /* 시그널 뱃지 스타일 */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge.overheat {
            background-color: rgba(255, 59, 48, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(255, 59, 48, 0.3);
            box-shadow: var(--red-glow);
            animation: pulse 2s infinite;
        }

        .badge.rebalanced {
            background-color: rgba(52, 199, 89, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(52, 199, 89, 0.3);
            box-shadow: var(--green-glow);
        }

        .badge.hold {
            background-color: rgba(138, 143, 159, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(138, 143, 159, 0.2);
        }

        /* 애니메이션 */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* 스피너 로딩 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            gap: 1rem;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.05);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--accent-blue);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <h1>📊 goKOSPI 리밸런싱 대시보드</h1>
        <div class="status-badge" id="refresh-time">새로고침 대기 중...</div>
    </header>

    <div class="container">
        <!-- 좌측: 백테스트 개요 & 탑 퍼포머 -->
        <div class="left-column">
            <div class="card" style="margin-bottom: 2rem;">
                <div class="card-title">📈 백테스트 검증 통계 <span style="font-size: 0.8rem; color: var(--text-secondary);">최근 3개년</span></div>
                <div class="stats-grid">
                    <div class="stat-box green">
                        <div class="stat-label">평균 신호 승률</div>
                        <div class="stat-value" id="hit-rate">72.1%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">총 시뮬레이션 신호</div>
                        <div class="stat-value" id="total-signals">860회</div>
                    </div>
                </div>
                <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6;">
                    * <strong>과열 경보 승률</strong>: 74.3% (경보 후 5일 내 하락) <br>
                    * <strong>조정 완료 승률</strong>: 70.2% (알림 후 5일 내 반등)
                </div>
            </div>

            <div class="card">
                <div class="card-title">🏆 누적 초과수익 Top 4 종목</div>
                <table>
                    <thead>
                        <tr>
                            <th>종목명</th>
                            <th>전략 수익</th>
                            <th>초과 수익 (Alpha)</th>
                        </tr>
                    </thead>
                    <tbody id="performers-list">
                        <!-- 동적 데이터 삽입 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 우측: 50대 종목 실시간 스캐너 -->
        <div class="right-column">
            <div class="card" style="min-height: 500px;">
                <div class="card-title">
                    🔍 50대 우량주 변동성 스캐너 
                    <span style="font-size: 0.8rem; color: var(--text-secondary); font-weight: normal;">실시간 계산</span>
                </div>
                <div id="scanner-content">
                    <div class="loading-container">
                        <div class="spinner"></div>
                        <p>KOSPI 50대 주요 종목 시세 다운로드 및 연산 중 (약 5~10초 소요)...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 백테스트 정보 가져오기
        async function loadBacktestSummary() {
            try {
                const res = await fetch('/api/backtest_summary');
                const data = await res.json();
                
                document.getElementById('hit-rate').innerText = data.hit_rate + '%';
                document.getElementById('total-signals').innerText = data.total_signals + '회';
                
                const performersBody = document.getElementById('performers-list');
                performersBody.innerHTML = '';
                data.top_performers.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${item.name}</strong> <span style="font-size: 0.75rem; color: var(--text-secondary);">${item.ticker.split('.')[0]}</span></td>
                        <td style="color: var(--accent-green)">+${item.st_return}%</td>
                        <td style="color: var(--accent-blue); font-weight: bold;">+${item.alpha}%p</td>
                    `;
                    performersBody.appendChild(row);
                });
            } catch (err) {
                console.error("백테스트 로드 에러:", err);
            }
        }

        // 실시간 신호 데이터 가져오기 및 렌더링
        async function loadSignals() {
            try {
                const res = await fetch('/api/signals');
                const result = await res.json();
                
                document.getElementById('refresh-time').innerText = '마지막 동기화: ' + result.timestamp;
                
                const scannerContent = document.getElementById('scanner-content');
                
                if (result.loading) {
                    // 여전히 백그라운드 수집 중
                    setTimeout(loadSignals, 2000);
                    return;
                }
                
                if (!result.data || result.data.length === 0) {
                    scannerContent.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">검출된 데이터가 없습니다.</p>';
                    return;
                }
                
                let tableHtml = `
                    <table>
                        <thead>
                            <tr>
                                <th>종목명 (코드)</th>
                                <th>현재가</th>
                                <th>Z-Score</th>
                                <th>상태 신호</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                result.data.forEach(item => {
                    let badgeClass = 'hold';
                    let badgeLabel = '대기 (HOLD)';
                    
                    if (item.signal === 'OVERHEAT' || item.signal === 'OVERHEATED_HOLD') {
                        badgeClass = 'overheat';
                        badgeLabel = '과열 (OVERHEAT)';
                    } else if (item.signal === 'REBALANCED') {
                        badgeClass = 'rebalanced';
                        badgeLabel = '조정완료 (BUY)';
                    }
                    
                    const priceFormatted = Math.floor(item.close).toLocaleString() + '원';
                    
                    tableHtml += `
                        <tr>
                            <td><strong>${item.name}</strong> <span style="font-size: 0.75rem; color: var(--text-secondary);">${item.ticker.split('.')[0]}</span></td>
                            <td>${priceFormatted} <span style="font-size: 0.75rem; color: ${item.change_pct >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'}">${item.change_pct >= 0 ? '+' : ''}${item.change_pct.toFixed(2)}%</span></td>
                            <td style="font-weight: bold; color: ${Math.abs(item.z_score) >= 2.0 ? 'var(--text-primary)' : 'var(--text-secondary)'}">${item.z_score.toFixed(2)}</td>
                            <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
                        </tr>
                    `;
                });
                
                tableHtml += `
                        </tbody>
                    </table>
                `;
                
                scannerContent.innerHTML = tableHtml;
            } catch (err) {
                console.error("신호 로드 에러:", err);
            }
        }

        // 초기 구동
        window.addEventListener('DOMContentLoaded', () => {
            loadBacktestSummary();
            loadSignals();
            
            // 30초마다 화면 자동 갱신
            setInterval(loadSignals, 30000);
        });
    </script>
</body>
</html>
